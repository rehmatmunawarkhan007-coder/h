<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Check</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow: hidden;
    position: relative;
}

/* Floating hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
    opacity: 0.6;
}
.heart::before, .heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
}
.heart::before { top: -10px; left: 0; }
.heart::after { left: 10px; top: 0; }

@keyframes float {
    from { transform: translateY(0) rotate(45deg); }
    to { transform: translateY(-800px) rotate(45deg); opacity: 0; }
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.92);
    padding: 50px 60px;
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5em;
    color: #ff4e50;
    margin: 0;
}

.subtext {
    margin-top: 10px;
    font-size: 1.1em;
    color: #555;
}

.buttons {
    margin-top: 40px;
}

button {
    padding: 15px 35px;
    font-size: 1.2em;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.queen {
    background: #ff4e50;
    color: white;
}

.not-queen {
    background: #ccc;
    color: #333;
    position: absolute;
}

button:hover {
    transform: scale(1.1);
}

/* Confetti */
.confetti {
    position: absolute;
    border-radius: 50%;
}
</style>
</head>

<body>

<div class="container">
    <h1>U Are A…</h1>
    <div class="subtext">You know what I wanna hear…</div>

    <div class="buttons">
        <button class="queen" onclick="queenClick()">Queen</button>
        <button class="not-queen" id="notQueen">Not a Queen</button>
    </div>
</div>

<script>
// Floating hearts
setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 400);

// Not a Queen movement
const notQueen = document.getElementById("notQueen");

function moveButton() {
    const maxX = window.innerWidth - notQueen.offsetWidth;
    const maxY = window.innerHeight - notQueen.offsetHeight;

    notQueen.style.left = Math.random() * maxX + "px";
    notQueen.style.top = Math.random() * maxY + "px";
}

notQueen.addEventListener("mouseenter", moveButton);
notQueen.addEventListener("click", moveButton);

// BIG confetti celebration
function queenClick() {
    const colors = ["#ff0","#f0f","#0ff","#0f0","#f00","#ff8800","#00f"];

    for (let i = 0; i < 300; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        confetti.style.width = confetti.style.height = (5 + Math.random()*8) + "px";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.top = "-20px";
        document.body.appendChild(confetti);

        let posY = -20;
        let drift = (Math.random() - 0.5) * 2;

        const fall = setInterval(() => {
            posY += 4 + Math.random()*4;
            confetti.style.top = posY + "px";
            confetti.style.left = confetti.offsetLeft + drift + "px";

            if (posY > window.innerHeight) {
                confetti.remove();
                clearInterval(fall);
            }
        }, 16);
    }

    alert("👑 I knew it. You're a Queen.");
}
</script>

</body>
</html>
